name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave blank to auto-derive from project)'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(./gradlew --console=plain -q currentVersion | sed 's/-SNAPSHOT//')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        run: ./gradlew -Pversion=${{ steps.version.outputs.VERSION  }} build

      - name: Publish
        run: ./gradlew -Pversion=${{ steps.version.outputs.VERSION }} publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}

      - name: Release
        run: ./gradlew -Pversion=${{ steps.version.outputs.VERSION }} jreleaserFullRelease
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-release
          path: |
            build/jreleaser/trace.log
            build/jreleaser/output.properties
